<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phustagram</title>
<link rel="icon" type="image/png" href="images/icon-phustagram.png" />

<style>
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --text:#111111;
  --muted:#737373;
  --line:#dbdbdb;
  --blue:#0095f6;
  --shadow:0 12px 40px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
}
a{color:inherit;text-decoration:none}
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1100px;
  margin:0 auto;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:800;
  letter-spacing:-.02em;
}
.brand img{
  width:28px;
  height:28px;
  border-radius:50%;
  object-fit:contain;
  background:#fff;
  padding:4px;
  border:1px solid var(--line);
}
.nav-links{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.back-link{
  font-size:14px;
  color:var(--blue);
  font-weight:600;
}
.back-link img{
  width:16px;
  height:16px;
  object-fit:contain;
  border-radius:50%;
  background:#fff;
  padding:2px;
  border:1px solid var(--line);
  vertical-align:middle;
  margin-right:6px;
}
.page{
  max-width:1100px;
  margin:0 auto;
  padding:24px 18px 40px;
}
.profile-bar{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:26px;
  min-width:0;
}
.profile-pic{
  width:64px;
  height:64px;
  min-width:64px;
  min-height:64px;
  flex-shrink:0;
  border-radius:50%;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);
  padding:2px;
}
.profile-pic-inner{
  width:100%;
  height:100%;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:20px;
}
.profile-copy{min-width:0}
.profile-copy h1{
  margin:0;
  font-size:22px;
  font-weight:700;
}
.profile-copy p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.grid-item{
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  cursor:pointer;
  background:#eee;
}
.grid-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .25s ease;
}
.grid-item:hover img{ transform:scale(1.04); }
.grid-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.25);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.2s ease;
  text-align:center;
  padding:16px;
}
.grid-item:hover .grid-overlay{ opacity:1; }
.multi-badge{
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(0,0,0,.55);
  color:#fff;
  font-size:12px;
  padding:6px 8px;
  border-radius:999px;
  font-weight:700;
}
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:200;
}
.modal{
  width:min(1280px, 100%);
  height:min(90vh, 900px);
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  display:grid;
  grid-template-columns:minmax(0, 1.35fr) 420px;
  box-shadow:var(--shadow);
}
.modal-left{
  position:relative;
  background:#000;
  min-width:0;
}
.slide{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}
.slide img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.92);
  cursor:pointer;
  font-size:20px;
  font-weight:800;
  color:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}
.nav-btn.prev{ left:14px; }
.nav-btn.next{ right:14px; }
.slide-count{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.58);
  color:#fff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.modal-right{
  display:flex;
  flex-direction:column;
  min-height:0;
  background:#fff;
}
.post-head{
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.author{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.author-pic{
  width:34px;
  height:34px;
  min-width:34px;
  min-height:34px;
  flex-shrink:0;
  border-radius:50%;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);
  padding:2px;
}
.author-pic-inner{
  width:100%;
  height:100%;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:800;
}
.author-name{
  font-size:14px;
  font-weight:700;
}
.post-body{
  flex:1;
  min-height:0;
  overflow:auto;
}
.caption{
  padding:16px;
  border-bottom:1px solid var(--line);
}
.caption-top{
  display:flex;
  gap:12px;
  align-items:flex-start;
  min-width:0;
}
.caption-copy{
  font-size:14px;
  line-height:1.55;
  min-width:0;
  overflow-wrap:break-word;
  word-break:break-word;
}
.details{
  padding:16px;
  display:grid;
  gap:10px;
  border-bottom:1px solid var(--line);
}
.detail-row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  font-size:13px;
  background:#fafafa;
  border:1px solid #efefef;
  border-radius:10px;
  padding:10px 12px;
}
.tags{
  padding:16px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--line);
}
.tag{
  padding:7px 10px;
  border-radius:999px;
  background:#f2f2f2;
  font-size:12px;
  font-weight:700;
}
.actions{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--line);
}
.icons{
  display:flex;
  gap:16px;
  font-size:25px;
  line-height:1;
}
.likes{
  margin-top:12px;
  font-size:14px;
  font-weight:700;
}
.meta{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}
.comment-box{
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
}
.comment-input{
  flex:1;
  border:none;
  outline:none;
  font-size:14px;
  background:transparent;
  min-width:0;
}
.post-link{
  color:var(--blue);
  font-weight:700;
  font-size:14px;
}
.close-btn{
  border:none;
  background:transparent;
  cursor:pointer;
  font-size:24px;
  line-height:1;
  flex-shrink:0;
}
@media (max-width: 980px){
  .modal{
    grid-template-columns:1fr;
    height:auto;
    max-height:92vh;
    overflow:auto;
  }
  .modal-left{ height:55vh; }
  .grid{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width: 640px){
  .page{ padding:18px 12px 28px; }
  .grid{ gap:4px; }
  .profile-copy h1{ font-size:20px; }
  .topbar-inner{ padding:12px; }
  .brand{ font-size:20px; }
  .modal-backdrop{ padding:0; }
  .modal{
    width:100%;
    height:100%;
    max-height:none;
    border-radius:0;
  }
  .modal-left{ height:42vh; }
  .detail-row{ flex-direction:column; gap:6px; }
}

  .site-footer{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  padding:24px 16px 30px;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="images/icon-phustagram.png" alt="Phustagram icon">
      <span>Phustagram</span>
    </div>
    <div class="nav-links">
      <a class="back-link" href="index.html"><img src="images/icon-phubook.png" alt="">Phubook</a>
      <a class="back-link" href="phutube.html"><img src="images/icon-phutube.png" alt="">PhuTube</a>
      <a class="back-link" href="phugleads.html"><img src="images/icon-phugleads.png" alt="">Phugle Ads</a>
    </div>
  </div>
</header>

<main class="page">
  <section class="profile-bar">
    <div class="profile-pic">
      <div class="profile-pic-inner">P</div>
    </div>
    <div class="profile-copy">
      <h1>phustagram</h1>
      <p>Visual stories, design works, and selected creative projects.</p>
    </div>
  </section>

  <section class="grid" id="grid"></section>
</main>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-left">
      <button class="nav-btn prev" id="prevBtn">‹</button>
      <div class="slide">
        <img id="slideImage" src="" alt="">
      </div>
      <button class="nav-btn next" id="nextBtn">›</button>
      <div class="slide-count" id="slideCount">1 / 1</div>
    </div>

    <div class="modal-right">
      <div class="post-head">
        <div class="author">
          <div class="author-pic"><div class="author-pic-inner">P</div></div>
          <div class="author-name">phudius</div>
        </div>
        <button class="close-btn" id="closeBtn">×</button>
      </div>

      <div class="post-body">
        <div class="caption">
          <div class="caption-top">
            <div class="author-pic" style="width:32px;height:32px;min-width:32px;min-height:32px;">
              <div class="author-pic-inner">P</div>
            </div>
            <div class="caption-copy" id="captionText"></div>
          </div>
        </div>

        <div class="details" id="detailsBox"></div>
        <div class="tags" id="tagsBox"></div>
      </div>

      <div class="actions">
        <div class="icons">♡ 💬 ✈︎</div>
        <div class="likes" id="likesText">12 likes</div>
        <div class="meta" id="metaText">2 days ago</div>
      </div>

      <div class="comment-box">
        <span style="font-size:22px;">☺</span>
        <input class="comment-input" placeholder="Add a comment..." />
        <span class="post-link">Post</span>
      </div>
    </div>
  </div>
</div>

<script>
const PROJECTS = [
  {
    title: "Project One",
    cover: "images/work1.jpg",
    images: ["images/work1.jpg","images/work2.jpg","images/work3.jpg"],
    caption: "Replace this with your real design project description.",
    likes: "24 likes",
    date: "3 days ago",
    tags: ["Design", "Branding", "Creative"],
    details: {
      Client: "Your Client",
      Category: "Design Project",
      Role: "Concept + Design",
      Tools: "Illustrator, Photoshop",
      Format: "Carousel"
    }
  },
  {
    title: "Project Two",
    cover: "images/work4.jpg",
    images: ["images/work4.jpg","images/work5.jpg","images/work6.jpg"],
    caption: "Replace this with another real project description.",
    likes: "18 likes",
    date: "1 week ago",
    tags: ["Visual System", "Layout"],
    details: {
      Client: "Your Client",
      Category: "Brand Design",
      Role: "Art Direction",
      Tools: "Illustrator, InDesign",
      Output: "Guideline + Templates"
    }
  }
];

const grid = document.getElementById("grid");
const modalBackdrop = document.getElementById("modalBackdrop");
const slideImage = document.getElementById("slideImage");
const slideCount = document.getElementById("slideCount");
const captionText = document.getElementById("captionText");
const detailsBox = document.getElementById("detailsBox");
const tagsBox = document.getElementById("tagsBox");
const likesText = document.getElementById("likesText");
const metaText = document.getElementById("metaText");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const closeBtn = document.getElementById("closeBtn");

let currentProject = 0;
let currentImage = 0;

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function renderGrid(){
  grid.innerHTML = PROJECTS.map((project, index) => `
    <article class="grid-item" data-index="${index}">
      <img src="${project.cover}" alt="${escapeHtml(project.title)}">
      <div class="multi-badge">${project.images.length} photos</div>
      <div class="grid-overlay"><div>${escapeHtml(project.title)}</div></div>
    </article>
  `).join("");

  document.querySelectorAll(".grid-item").forEach(item => {
    item.addEventListener("click", () => openProject(Number(item.dataset.index)));
  });
}

function openProject(index){
  currentProject = index;
  currentImage = 0;
  updateModal();
  modalBackdrop.style.display = "flex";
}

function updateModal(){
  const project = PROJECTS[currentProject];
  const imageSrc = project.images[currentImage];

  slideImage.src = imageSrc;
  slideImage.alt = project.title;
  slideCount.textContent = `${currentImage + 1} / ${project.images.length}`;
  captionText.innerHTML = `<strong>phudius</strong> ${escapeHtml(project.caption)}`;
  likesText.textContent = project.likes;
  metaText.textContent = project.date;

  tagsBox.innerHTML = project.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
  detailsBox.innerHTML = Object.entries(project.details).map(([key, value]) => `
    <div class="detail-row">
      <b>${escapeHtml(key)}</b>
      <span>${escapeHtml(value)}</span>
    </div>
  `).join("");

  prevBtn.style.display = project.images.length > 1 ? "flex" : "none";
  nextBtn.style.display = project.images.length > 1 ? "flex" : "none";
}

function closeModal(){
  modalBackdrop.style.display = "none";
}

function showPrev(){
  const project = PROJECTS[currentProject];
  currentImage = (currentImage - 1 + project.images.length) % project.images.length;
  updateModal();
}

function showNext(){
  const project = PROJECTS[currentProject];
  currentImage = (currentImage + 1) % project.images.length;
  updateModal();
}

prevBtn.addEventListener("click", showPrev);
nextBtn.addEventListener("click", showNext);
closeBtn.addEventListener("click", closeModal);

modalBackdrop.addEventListener("click", e => {
  if(e.target === modalBackdrop) closeModal();
});

document.addEventListener("keydown", e => {
  if(modalBackdrop.style.display === "flex"){
    if(e.key === "Escape") closeModal();
    if(e.key === "ArrowLeft") showPrev();
    if(e.key === "ArrowRight") showNext();
  }
});

renderGrid();
</script>

  <footer class="site-footer">
  © 2026 Phuwadech Klinklay
</footer>
  
</body>
</html>
