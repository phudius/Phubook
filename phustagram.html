<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phustagram</title>
<link rel="icon" type="image/png" href="images/icon-phustagram.png" />

<style>
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --text:#111111;
  --muted:#737373;
  --line:#dbdbdb;
  --blue:#0095f6;
  --shadow:0 12px 40px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
body.modal-open{ overflow:hidden; }

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1100px;
  margin:0 auto;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:800;
}
.brand img{
  width:28px;height:28px;
  border-radius:50%;
  padding:4px;
  border:1px solid var(--line);
}
.nav-links{
  display:flex;
  gap:10px;
}
.back-link{
  font-size:14px;
  color:var(--blue);
  font-weight:600;
}
.back-link img{
  width:16px;height:16px;
  margin-right:6px;
  border:1px solid var(--line);
  padding:2px;
  border-radius:50%;
}

/* PAGE */
.page{
  max-width:1100px;
  margin:0 auto;
  padding:24px 18px 40px;
}
.profile-bar{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:26px;
}
.profile-pic{
  width:64px;height:64px;
  border-radius:50%;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);
  padding:2px;
}
.profile-pic-inner{
  width:100%;height:100%;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}
.profile-copy h1{ margin:0;font-size:22px; }
.profile-copy p{ margin:6px 0 0;color:var(--muted);font-size:14px; }

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.grid-item{
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  cursor:pointer;
}
.grid-item img{
  width:100%;height:100%;
  object-fit:cover;
  transition:.25s;
}
.grid-item:hover img{ transform:scale(1.05); }
.grid-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.3);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.2s;
}
.grid-item:hover .grid-overlay{ opacity:1; }
.multi-badge{
  position:absolute;
  top:10px;right:10px;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:12px;
  padding:5px 8px;
  border-radius:999px;
}

/* MODAL */
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}
.modal-backdrop.show{ display:flex; }

.modal{
  width:min(1200px,100%);
  height:90vh;
  background:#fff;
  display:grid;
  grid-template-columns:1.3fr 420px;
}

.modal-left{
  background:#000;
  position:relative;
}
.slide img{
  width:100%;height:100%;
  object-fit:contain;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:36px;height:36px;
  border:none;
  border-radius:50%;
  background:#fff;
  cursor:pointer;
}
.nav-btn.prev{ left:10px; }
.nav-btn.next{ right:10px; }

.slide-count{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  color:#fff;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* RIGHT */
.modal-right{
  display:flex;
  flex-direction:column;
}
.post-head{
  padding:12px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
}
.author{ display:flex;gap:10px;align-items:center; }
.author-pic{
  width:34px;height:34px;
  border-radius:50%;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);
  padding:2px;
}
.author-pic-inner{
  width:100%;height:100%;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
}
.caption{ padding:16px;border-bottom:1px solid var(--line); }
.details{ padding:16px;border-bottom:1px solid var(--line); }
.detail-row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:8px;
}
.tags{ padding:16px;border-bottom:1px solid var(--line); }
.tag{
  background:#eee;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
}

.actions{ padding:14px; }
.likes{ font-weight:700;margin-top:8px; }
.meta{ font-size:12px;color:var(--muted); }

/* FOOTER */
.site-footer{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  padding:24px;
}

/* RESPONSIVE */
@media(max-width:980px){
  .modal{ grid-template-columns:1fr; height:auto; }
  .grid{ grid-template-columns:repeat(2,1fr); }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="images/icon-phustagram.png">
      Phustagram
    </div>
    <div class="nav-links">
      <a class="back-link" href="index.html">Phubook</a>
      <a class="back-link" href="phutube.html">PhuTube</a>
      <a class="back-link" href="phugleads.html">Phugle Ads</a>
    </div>
  </div>
</header>

<main class="page">
  <section class="profile-bar">
    <div class="profile-pic"><div class="profile-pic-inner">P</div></div>
    <div class="profile-copy">
      <h1>phustagram</h1>
      <p>Visual stories, design works, and selected creative projects.</p>
    </div>
  </section>

  <section class="grid" id="grid"></section>
</main>

<footer class="site-footer">
  © 2026 Phuwadech Klinklay
</footer>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">

    <div class="modal-left">
      <button class="nav-btn prev" id="prevBtn">‹</button>
      <div class="slide">
        <img id="slideImage">
      </div>
      <button class="nav-btn next" id="nextBtn">›</button>
      <div class="slide-count" id="slideCount"></div>
    </div>

    <div class="modal-right">
      <div class="post-head">
        <div class="author">
          <div class="author-pic"><div class="author-pic-inner">P</div></div>
          <b>phudius</b>
        </div>
        <button onclick="closeModal()">×</button>
      </div>

      <div class="caption" id="captionText"></div>
      <div class="details" id="detailsBox"></div>
      <div class="tags" id="tagsBox"></div>

      <div class="actions">
        <div class="likes" id="likesText"></div>
        <div class="meta" id="metaText"></div>
      </div>
    </div>

  </div>
</div>

<script>
const PROJECTS = [
{
  title: "Mascot Design for Veranda Resort Phuket, Autograph Collection",
  cover: "images/oaew1.jpg",
  images: [
    "images/oaew1.jpg",
    "images/oaew2.jpg",
    "images/oaew3.jpg",
    "images/oaew4.jpg",
    "images/oaew5.jpg",
    "images/oaew6.jpg",
    "images/oaew7.jpg"
  ],
  caption: "A mascot design project created for Veranda Resort Phuket, Autograph Collection, bringing the brand to life through a playful and distinctive character.",
  likes: "48 likes",
  date: "Brand Project",
  tags: ["Mascot", "Branding", "Hospitality"],
  details: {
    Client: "Veranda Resort Phuket",
    Category: "Mascot Design",
    Role: "Concept + Character Design",
    Tools: "Illustrator, Photoshop"
  }
}
];

const grid = document.getElementById("grid");
const modalBackdrop = document.getElementById("modalBackdrop");
const slideImage = document.getElementById("slideImage");
const slideCount = document.getElementById("slideCount");

let currentProject = 0;
let currentImage = 0;

function renderGrid(){
  grid.innerHTML = PROJECTS.map((p,i)=>`
    <div class="grid-item" onclick="openProject(${i})">
      <img src="${p.cover}">
      <div class="multi-badge">${p.images.length} photos</div>
      <div class="grid-overlay">${p.title}</div>
    </div>
  `).join("");
}

function openProject(i){
  currentProject=i;
  currentImage=0;
  updateModal();
  modalBackdrop.classList.add("show");
  document.body.classList.add("modal-open");
}

function updateModal(){
  const p=PROJECTS[currentProject];
  slideImage.src=p.images[currentImage];
  slideCount.innerText=(currentImage+1)+" / "+p.images.length;

  document.getElementById("captionText").innerHTML="<b>phudius</b> "+p.caption;
  document.getElementById("likesText").innerText=p.likes;
  document.getElementById("metaText").innerText=p.date;

  document.getElementById("tagsBox").innerHTML=p.tags.map(t=>`<span class="tag">${t}</span>`).join("");

  document.getElementById("detailsBox").innerHTML=
    Object.entries(p.details).map(([k,v])=>`
      <div class="detail-row"><b>${k}</b><span>${v}</span></div>
    `).join("");
}

function closeModal(){
  modalBackdrop.classList.remove("show");
  document.body.classList.remove("modal-open");
}

document.getElementById("prevBtn").onclick=()=>{
  const p=PROJECTS[currentProject];
  currentImage=(currentImage-1+p.images.length)%p.images.length;
  updateModal();
};

document.getElementById("nextBtn").onclick=()=>{
  const p=PROJECTS[currentProject];
  currentImage=(currentImage+1)%p.images.length;
  updateModal();
};

renderGrid();
</script>

</body>
</html>
