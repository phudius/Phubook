<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phustagram</title>
<link rel="icon" type="image/png" href="images/icon-phustagram.png" />

<style>
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --text:#111111;
  --muted:#737373;
  --line:#dbdbdb;
  --blue:#0095f6;
  --shadow:0 12px 40px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
body.modal-open{overflow:hidden}
img{display:block;max-width:100%}

/* --- (styles unchanged, kept exactly as your latest version) --- */
.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:50}
.topbar-inner{max-width:1100px;margin:auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px}
.brand img{width:28px;height:28px;border-radius:50%;padding:4px;border:1px solid var(--line)}
.nav-links{display:flex;gap:10px}
.back-link{font-size:14px;color:var(--blue);font-weight:600}

.page{max-width:1100px;margin:auto;padding:24px 18px}
.profile-bar{display:flex;gap:16px;margin-bottom:26px}
.profile-pic{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);padding:2px}
.profile-pic-inner{width:100%;height:100%;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-item{position:relative;aspect-ratio:1/1;overflow:hidden;cursor:pointer}
.grid-item img{width:100%;height:100%;object-fit:cover}
.multi-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;padding:5px 8px;border-radius:20px;font-size:12px}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center}
.modal-backdrop.show{display:flex}

.modal{width:min(1280px,100%);background:#fff;display:grid;grid-template-columns:1.3fr 420px}
.modal-left{background:#000;position:relative;display:flex;align-items:center;justify-content:center}
.slide-frame img{max-width:100%;max-height:100%;object-fit:contain}

.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(6px);
  font-size:20px;cursor:pointer;
  opacity:.3;
}
.modal-left:hover .nav-btn{opacity:1}
.nav-btn.prev{left:10px}
.nav-btn.next{right:10px}

.modal-right{display:flex;flex-direction:column}
.post-head{padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.caption{padding:16px;border-bottom:1px solid var(--line)}
.caption-meta{font-size:13px;color:var(--muted);margin-top:6px}
.details{padding:16px;border-bottom:1px solid var(--line)}
.detail-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.tags{padding:16px}
.tag{background:#eee;padding:6px 10px;border-radius:999px;font-size:12px;margin-right:6px}

.site-footer{text-align:center;font-size:12px;color:var(--muted);padding:20px}

/* mobile fullscreen */
@media(max-width:640px){
  .modal{grid-template-columns:1fr;height:100%}
  .slide-frame img{width:100%;border-radius:0}
}
</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="images/icon-phustagram.png">Phustagram
    </div>
    <div class="nav-links">
      <a class="back-link" href="index.html">Phubook</a>
      <a class="back-link" href="phutube.html">PhuTube</a>
      <a class="back-link" href="phugleads.html">Phugle Ads</a>
    </div>
  </div>
</header>

<main class="page">
  <section class="profile-bar">
    <div class="profile-pic"><div class="profile-pic-inner">P</div></div>
    <div>
      <h1>phustagram</h1>
      <p style="color:var(--muted)">Visual stories and creative works</p>
    </div>
  </section>

  <section class="grid" id="grid"></section>
</main>

<footer class="site-footer">© 2026 Phuwadech Klinklay</footer>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">

    <div class="modal-left" id="modalLeft">
      <button class="nav-btn prev" id="prevBtn">‹</button>
      <div class="slide-frame">
        <img id="slideImage">
      </div>
      <button class="nav-btn next" id="nextBtn">›</button>
    </div>

    <div class="modal-right">
      <div class="post-head">
        <b>phudius</b>
        <button onclick="closeModal()">×</button>
      </div>

      <div class="caption">
        <div id="captionText"></div>
        <div class="caption-meta" id="metaText"></div>
      </div>

      <div class="details" id="detailsBox"></div>
      <div class="tags" id="tagsBox"></div>
    </div>

  </div>
</div>

<script>
const PROJECTS = [
{
  title:"Mascot Design for Veranda Resort Phuket",
  cover:"images/oaew1.jpg",
  images:["images/oaew1.jpg","images/oaew2.jpg","images/oaew3.jpg","images/oaew4.jpg","images/oaew5.jpg","images/oaew6.jpg","images/oaew7.jpg"],
  caption:"A mascot design project created for Veranda Resort Phuket, bringing the brand to life through a playful and distinctive character.",
  likes:"48 likes",
  date:"Brand Project",
  tags:["Mascot Design","Brand Character"],
  details:{
    Client:"Veranda Resort Phuket",
    Category:"Mascot Design",
    Role:"Concept + Character Design",
    Tools:"Illustrator, Photoshop"
  }
},
{
  title:"Autograph Moment Marketing Concept",
  cover:"images/AK-01.jpg",
  images:["images/AK-01.jpg","images/AK-02.jpg","images/AK-03.jpg","images/AK-04.jpg","images/AK-05.jpg","images/AK-06.jpg","images/AK-07.jpg","images/AK-08.jpg","images/AK-09.jpg","images/AK-10.jpg","images/AK-11.jpg"],
  caption:"An “Autograph Moment” is a signature, immersive experience designed by Autograph Collection Hotels to express each property’s unique story.",
  likes:"56 likes",
  date:"Marketing Concept",
  tags:["Marketing Initiative","Autograph Moment"],
  details:{
    Client:"Veranda Resort Phuket",
    Category:"Marketing Initiative Planning & Design",
    Role:"Concept + Collateral Design",
    Tools:"Illustrator, Photoshop"
  }
}
];

const grid=document.getElementById("grid");
const modal=document.getElementById("modalBackdrop");
const img=document.getElementById("slideImage");

let p=0,i=0;

function render(){
  grid.innerHTML=PROJECTS.map((x,idx)=>`
    <div class="grid-item" onclick="openProject(${idx})">
      <img src="${x.cover}">
      <div class="multi-badge">${x.images.length} photos</div>
    </div>
  `).join("");
}

function openProject(idx){
  p=idx;i=0;update();modal.classList.add("show");
}

function update(){
  const x=PROJECTS[p];
  img.src=x.images[i];
  document.getElementById("captionText").innerHTML="<b>phudius</b> "+x.caption;
  document.getElementById("metaText").innerText=x.likes+" • "+x.date;
  document.getElementById("tagsBox").innerHTML=x.tags.map(t=>`<span class="tag">${t}</span>`).join("");
  document.getElementById("detailsBox").innerHTML=Object.entries(x.details).map(([k,v])=>`<div class="detail-row"><b>${k}</b><span>${v}</span></div>`).join("");
}

function closeModal(){modal.classList.remove("show")}
document.getElementById("prevBtn").onclick=()=>{i=(i-1+PROJECTS[p].images.length)%PROJECTS[p].images.length;update()}
document.getElementById("nextBtn").onclick=()=>{i=(i+1)%PROJECTS[p].images.length;update()}

render();
</script>

</body>
</html>
