<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhuTube</title>
<link rel="icon" type="image/png" href="images/icon-phutube.png" />
<style>
:root{
  --bg:#0f0f0f;
  --panel:#181818;
  --panel-2:#212121;
  --text:#f1f1f1;
  --muted:#aaa;
  --line:#303030;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
}
body.modal-open{overflow:hidden}
a{color:inherit;text-decoration:none}
button,input{font:inherit}
img{display:block;max-width:100%}

.topbar{
  position:sticky;
  top:0;
  z-index:70;
  height:56px;
  background:rgba(15,15,15,.96);
  border-bottom:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(8px);
}
.topbar-inner{
  height:100%;
  max-width:1440px;
  margin:0 auto;
  padding:0 16px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:18px;
  align-items:center;
}
.brand-wrap{display:flex;align-items:center;gap:14px;min-width:0}
.burger{
  width:36px;
  height:36px;
  border-radius:999px;
  border:none;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
.burger:hover{background:#272727}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
  letter-spacing:-.02em;
}
.brand img{
  width:28px;
  height:28px;
  border-radius:50%;
  object-fit:contain;
  background:#fff;
  padding:4px;
  border:1px solid rgba(255,255,255,.15);
}
.searchbar{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:0;
}
.search-shell{
  width:min(720px,100%);
  display:grid;
  grid-template-columns:1fr 64px;
  align-items:center;
}
.search-shell input{
  height:40px;
  padding:0 16px;
  background:#121212;
  color:#fff;
  border:1px solid var(--line);
  border-right:none;
  border-radius:999px 0 0 999px;
  outline:none;
}
.search-shell input:focus{
  border-color:#555;
}
.search-btn{
  height:40px;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:#fff;
  border-radius:0 999px 999px 0;
  cursor:pointer;
}
.search-btn:hover{background:#2b2b2b}
.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.avatar{
  width:34px;
  height:34px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff9966,#ff5e62);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
  flex-shrink:0;
}

.layout{
  max-width:1440px;
  margin:0 auto;
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:calc(100vh - 56px);
}
.sidebar{
  padding:12px;
  border-right:1px solid rgba(255,255,255,.05);
  position:sticky;
  top:56px;
  height:calc(100vh - 56px);
  background:var(--bg);
}
.nav-group{
  padding-bottom:12px;
  margin-bottom:12px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.nav-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 12px;
  border-radius:12px;
  color:#fff;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
}
.nav-item:hover{background:#272727}
.nav-item.active{background:#272727;font-weight:700}
.nav-icon{
  width:22px;
  height:22px;
  border-radius:50%;
  object-fit:contain;
  background:#fff;
  padding:3px;
  border:1px solid rgba(255,255,255,.15);
  flex-shrink:0;
}

.sidebar-overlay{
  display:none;
}

.content{
  padding:18px 24px 40px;
  min-width:0;
}
.channel-banner{
  height:180px;
  border-radius:18px;
  background:linear-gradient(135deg,#1f2937,#0ea5e9 55%,#111827);
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.05);
}
.channel-banner::after{
  content:"";
  position:absolute;
  inset:-40px;
  background:
    radial-gradient(circle at 20% 25%, rgba(255,255,255,.18), transparent 28%),
    radial-gradient(circle at 72% 35%, rgba(255,255,255,.14), transparent 22%),
    radial-gradient(circle at 50% 90%, rgba(255,255,255,.08), transparent 30%);
}

.channel-card{
  display:flex;
  gap:18px;
  align-items:flex-start;
  min-width:0;
  margin-top:16px;
}
.channel-avatar{
  width:96px;
  height:96px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff0033,#ff7a00);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:900;
  flex-shrink:0;
}
.channel-copy h1{
  margin:0 0 6px;
  font-size:32px;
  letter-spacing:-.03em;
}
.channel-meta{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.video-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:22px 16px;
}
.video-card{
  cursor:pointer;
  min-width:0;
}
.thumb{
  position:relative;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  background:#222;
  border:1px solid rgba(255,255,255,.05);
}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .25s ease;
}
.video-card:hover .thumb img{transform:scale(1.03)}
.duration{
  position:absolute;
  right:8px;
  bottom:8px;
  background:rgba(0,0,0,.82);
  padding:4px 6px;
  border-radius:6px;
  font-size:12px;
  font-weight:800;
}
.play-badge{
  position:absolute;
  left:10px;
  top:10px;
  background:rgba(0,0,0,.55);
  width:34px;
  height:34px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}
.video-meta{
  display:grid;
  grid-template-columns:40px 1fr;
  gap:12px;
  padding-top:10px;
  align-items:start;
}
.mini-avatar{
  width:40px;
  height:40px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff0033,#ff7a00);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#fff;
}
.video-title{
  margin:0;
  font-size:16px;
  line-height:1.35;
  font-weight:800;
  color:#f1f1f1;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.video-sub{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}

.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:100;
}
.modal{
  width:min(1400px,100%);
  max-height:92vh;
  overflow:hidden;
  background:#181818;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  display:grid;
  grid-template-columns:minmax(0,1.2fr) 380px;
}
.player-wrap{
  padding:18px;
  min-width:0;
}
.player-box{
  aspect-ratio:16/9;
  background:#000;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  border:1px solid rgba(255,255,255,.06);
}
.player-box video,
.player-box img,
.player-box iframe{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
  border:0;
}
.player-overlay{
  position:absolute;
  inset:auto 14px 14px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  z-index:2;
  pointer-events:none;
}
.player-control,
#playerDuration{
  pointer-events:auto;
}
.player-control{
  background:rgba(0,0,0,.7);
  color:#fff;
  border:none;
  border-radius:999px;
  height:38px;
  padding:0 14px;
  cursor:pointer;
  font-weight:700;
}
.player-title{
  margin:16px 0 8px;
  font-size:22px;
  line-height:1.35;
  letter-spacing:-.02em;
}
.player-stats{
  color:var(--muted);
  font-size:14px;
  margin-bottom:16px;
}
.player-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.action-btn{
  height:38px;
  padding:0 14px;
  border-radius:999px;
  border:none;
  background:#272727;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
.video-desc{
  background:#272727;
  border-radius:16px;
  padding:14px 16px;
  color:#ddd;
  font-size:14px;
  line-height:1.65;
}

.side-panel{
  border-left:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  min-height:0;
}
.side-head{
  padding:16px 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.side-head h3{
  margin:0;
  font-size:16px;
}
.close-btn{
  border:none;
  background:transparent;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  line-height:1;
}
.side-list{
  padding:0 12px 14px;
  overflow:auto;
}
.side-card{
  display:grid;
  grid-template-columns:168px 1fr;
  gap:10px;
  padding:8px;
  border-radius:14px;
  cursor:pointer;
  border:1px solid transparent;
}
.side-card:hover{background:#232323}
.side-card.active{
  background:#232323;
  border-color:rgba(255,255,255,.08);
}
.side-thumb{
  aspect-ratio:16/9;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  background:#222;
}
.side-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.side-title{
  margin:0;
  font-size:14px;
  font-weight:700;
  line-height:1.35;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.side-sub{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  line-height:1.45;
}

.empty-state{
  grid-column:1 / -1;
  background:#181818;
  border:1px solid rgba(255,255,255,.06);
  padding:28px;
  border-radius:18px;
  color:#aaa;
  text-align:center;
  line-height:1.6;
}

@media (max-width:1180px){
  .video-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:980px){
  .layout{grid-template-columns:1fr}
  .sidebar{
    position:fixed;
    top:56px;
    left:0;
    width:260px;
    height:calc(100vh - 56px);
    z-index:80;
    transform:translateX(-100%);
    transition:transform .25s ease;
    border-right:1px solid rgba(255,255,255,.08);
  }
  .sidebar.open{
    transform:translateX(0);
  }
  .sidebar-overlay{
    display:none;
    position:fixed;
    inset:56px 0 0 0;
    background:rgba(0,0,0,.45);
    z-index:75;
  }
  .sidebar-overlay.show{
    display:block;
  }
  .modal{grid-template-columns:1fr;max-height:94vh}
  .side-panel{
    border-left:none;
    border-top:1px solid rgba(255,255,255,.06);
    max-height:42vh;
  }
}
@media (max-width:720px){
  .topbar-inner{
    grid-template-columns:1fr auto;
    gap:12px;
  }
  .searchbar{
    grid-column:1 / -1;
    order:3;
  }
  .content{padding:14px 12px 28px}
  .channel-card{
    flex-direction:column;
  }
  .channel-avatar{
    width:76px;
    height:76px;
    font-size:28px;
  }
  .channel-copy h1{font-size:26px}
  .video-grid{
    grid-template-columns:1fr;
    gap:18px;
  }
  .modal-backdrop{padding:0}
  .modal{
    width:100%;
    height:100%;
    max-height:none;
    border-radius:0;
  }
  .player-wrap{padding:12px}
  .side-card{
    grid-template-columns:132px 1fr;
  }
}
</style>
</head>
<body>

<header class="topbar" id="top">
  <div class="topbar-inner">
    <div class="brand-wrap">
      <button class="burger" id="burgerBtn" type="button" aria-label="Open menu">☰</button>
      <a class="brand" href="#top" aria-label="Back to top">
        <img src="images/icon-phutube.png" alt="PhuTube icon">
        <span>PhuTube</span>
      </a>
    </div>

    <div class="searchbar">
      <div class="search-shell">
        <input id="searchInput" type="text" placeholder="Search videos, campaigns, reels, motion works..." aria-label="Search videos" />
        <button class="search-btn" id="searchBtn" type="button" aria-label="Search">⌕</button>
      </div>
    </div>

    <div class="top-actions">
      <div class="avatar">P</div>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="nav-group">
      <div class="nav-item active">
        <img class="nav-icon" src="images/icon-phutube.png" alt="">
        <span>PhuTube</span>
      </div>
      <a class="nav-item" href="index.html">
        <img class="nav-icon" src="images/icon-phubook.png" alt="">
        <span>Phubook</span>
      </a>
      <a class="nav-item" href="phustagram.html">
        <img class="nav-icon" src="images/icon-phustagram.png" alt="">
        <span>Phustagram</span>
      </a>
      <a class="nav-item" href="phugleads.html">
        <img class="nav-icon" src="images/icon-phugleads.png" alt="">
        <span>Phugle Ads</span>
      </a>
    </div>
  </aside>

  <main class="content">
    <div class="channel-banner"></div>

    <div class="channel-card">
      <div class="channel-avatar">P</div>
      <div class="channel-copy">
        <h1>PhuTube</h1>
        <div class="channel-meta">@phutubevideo • Video Work Showcase • Filming, Video Editing, and Branded Content</div>
      </div>
    </div>

    <section class="video-grid" id="videoGrid"></section>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="playerTitle">
    <div class="player-wrap">
      <div class="player-box">
        <video id="playerVideo" controls playsinline style="display:none"></video>
        <img id="playerImage" alt="Video preview" style="display:none" />
        <iframe id="playerFrame" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin" style="display:none"></iframe>

        <div class="player-overlay">
          <button class="player-control" id="previewBtn" type="button">▶ Preview</button>
          <span id="playerDuration" style="background:rgba(0,0,0,.72);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800">00:00</span>
        </div>
      </div>

      <h2 class="player-title" id="playerTitle">Project Title</h2>
      <div class="player-stats" id="playerStats">1.2K views • 2 weeks ago</div>

      <div class="player-actions">
        <button class="action-btn" type="button">👍 Like</button>
        <button class="action-btn" type="button">↗ Share</button>
        <button class="action-btn" type="button">＋ Save</button>
      </div>

      <div class="video-desc" id="playerDesc"></div>
    </div>

    <aside class="side-panel">
      <div class="side-head">
        <h3>More videos</h3>
        <button class="close-btn" id="closeBtn" type="button" aria-label="Close">×</button>
      </div>
      <div class="side-list" id="sideList"></div>
    </aside>
  </div>
</div>

<script>
const VIDEOS = [
  {
    title: "1 Year Anniversary of Veranda Resort Phuket",
    category: "campaign",
    thumbnail: "images/phutubevidcover-01.jpg",
    poster: "images/phutubevidcover-01.jpg",
    video: "",
    driveEmbed: "https://drive.google.com/file/d/169J5BO4UNfNJ-NKLwl-bdpz9KPV9d9S2/preview",
    duration: "0:47",
    views: "1.8K views",
    date: "2 weeks ago",
    channel: "PhuTube",
    description: "This project celebrates the 1-year anniversary of Veranda Resort Phuket, Autograph Collection, which I worked on with a video production company.",
    details: [
      "Role: Concept Development, Visual Direction, and Editing",
      "Tools: Adobe Premiere Pro",
      "Format: Promotional video"
    ]
  },
  {
    title: "Video Project Two",
    category: "branding",
    thumbnail: "images/video2.jpg",
    poster: "images/video2.jpg",
    video: "",
    driveEmbed: "",
    duration: "1:12",
    views: "2.4K views",
    date: "1 month ago",
    channel: "PhuTube",
    description: "Replace this with your second video project description.",
    details: [
      "Role: Art direction and editing",
      "Focus: Brand storytelling",
      "Output: Presentation teaser"
    ]
  }
];

const videoGrid = document.getElementById("videoGrid");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const modalBackdrop = document.getElementById("modalBackdrop");

const playerVideo = document.getElementById("playerVideo");
const playerImage = document.getElementById("playerImage");
const playerFrame = document.getElementById("playerFrame");
const previewBtn = document.getElementById("previewBtn");
const playerDuration = document.getElementById("playerDuration");
const playerTitle = document.getElementById("playerTitle");
const playerStats = document.getElementById("playerStats");
const playerDesc = document.getElementById("playerDesc");
const sideList = document.getElementById("sideList");
const closeBtn = document.getElementById("closeBtn");

const burgerBtn = document.getElementById("burgerBtn");
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");

let currentIndex = 0;
let filteredVideos = [...VIDEOS];

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function resetPlayer(){
  playerVideo.pause();
  playerVideo.removeAttribute("src");
  playerVideo.removeAttribute("poster");
  playerVideo.load();
  playerVideo.style.display = "none";

  playerImage.removeAttribute("src");
  playerImage.style.display = "none";

  playerFrame.src = "";
  playerFrame.style.display = "none";

  previewBtn.style.display = "inline-flex";
}

function normalize(text){
  return String(text).toLowerCase().trim();
}

function applyFilters(){
  const q = normalize(searchInput.value);

  filteredVideos = VIDEOS.filter(video => {
    const haystack = [
      video.title,
      video.description,
      video.category,
      video.channel,
      ...(video.details || [])
    ].join(" ").toLowerCase();

    return (!q || haystack.includes(q));
  });

  renderGrid();
}

function renderGrid(){
  if(!filteredVideos.length){
    videoGrid.innerHTML = `
      <div class="empty-state">
        No videos found for your search.<br>
        Try another keyword.
      </div>
    `;
    return;
  }

  videoGrid.innerHTML = filteredVideos.map((video, index) => `
    <article class="video-card" data-index="${index}" tabindex="0" aria-label="${escapeHtml(video.title)}">
      <div class="thumb">
        <img src="${escapeHtml(video.thumbnail)}" alt="${escapeHtml(video.title)}" loading="lazy">
        <div class="play-badge">▶</div>
        <div class="duration">${escapeHtml(video.duration)}</div>
      </div>
      <div class="video-meta">
        <div class="mini-avatar">P</div>
        <div>
          <h3 class="video-title">${escapeHtml(video.title)}</h3>
          <div class="video-sub">
            ${escapeHtml(video.channel)}<br>
            ${escapeHtml(video.views)} • ${escapeHtml(video.date)}
          </div>
        </div>
      </div>
    </article>
  `).join("");

  document.querySelectorAll(".video-card").forEach(card => {
    card.addEventListener("click", () => openVideo(Number(card.dataset.index)));
    card.addEventListener("keydown", e => {
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        openVideo(Number(card.dataset.index));
      }
    });
  });
}

function openVideo(index){
  currentIndex = index;
  const video = filteredVideos[index];
  if(!video) return;

  playerTitle.textContent = video.title;
  playerStats.textContent = `${video.views} • ${video.date}`;
  playerDuration.textContent = video.duration;

  playerDesc.innerHTML = `
    <div style="font-weight:700;margin-bottom:8px">${escapeHtml(video.channel)}</div>
    <div>${escapeHtml(video.description)}</div>
    <div style="margin-top:12px;color:#bdbdbd">
      ${(video.details || []).map(item => `• ${escapeHtml(item)}`).join("<br>")}
    </div>
  `;

  resetPlayer();

  if(video.driveEmbed){
    playerFrame.src = video.driveEmbed;
    playerFrame.style.display = "block";
    previewBtn.style.display = "none";
  } else if(video.video){
    playerVideo.src = video.video;
    playerVideo.poster = video.poster || video.thumbnail;
    playerVideo.style.display = "block";
    previewBtn.style.display = "inline-flex";
  } else {
    playerImage.src = video.poster || video.thumbnail;
    playerImage.alt = video.title;
    playerImage.style.display = "block";
    previewBtn.style.display = "none";
  }

  renderSideList();
  modalBackdrop.style.display = "flex";
  modalBackdrop.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}

function renderSideList(){
  sideList.innerHTML = filteredVideos.map((video, index) => `
    <article class="side-card ${index === currentIndex ? "active" : ""}" data-side-index="${index}">
      <div class="side-thumb">
        <img src="${escapeHtml(video.thumbnail)}" alt="${escapeHtml(video.title)}" loading="lazy">
        <div class="duration" style="right:6px;bottom:6px;font-size:11px">${escapeHtml(video.duration)}</div>
      </div>
      <div>
        <h4 class="side-title">${escapeHtml(video.title)}</h4>
        <div class="side-sub">
          ${escapeHtml(video.channel)}<br>
          ${escapeHtml(video.views)} • ${escapeHtml(video.date)}
        </div>
      </div>
    </article>
  `).join("");

  document.querySelectorAll("[data-side-index]").forEach(card => {
    card.addEventListener("click", () => openVideo(Number(card.dataset.sideIndex)));
  });
}

function closeModal(){
  modalBackdrop.style.display = "none";
  modalBackdrop.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  resetPlayer();
}

previewBtn.addEventListener("click", () => {
  const video = filteredVideos[currentIndex];
  if(video && video.video){
    playerVideo.style.display = "block";
    playerImage.style.display = "none";
    playerFrame.style.display = "none";
    playerVideo.play();
  }
});

searchInput.addEventListener("input", applyFilters);
searchInput.addEventListener("keydown", e => {
  if(e.key === "Enter") applyFilters();
});
searchBtn.addEventListener("click", applyFilters);

closeBtn.addEventListener("click", closeModal);

modalBackdrop.addEventListener("click", e => {
  if(e.target === modalBackdrop) closeModal();
});

document.addEventListener("keydown", e => {
  if(e.key === "Escape" && modalBackdrop.style.display === "flex"){
    closeModal();
  }
});

function openSidebar(){
  sidebar.classList.add("open");
  sidebarOverlay.classList.add("show");
}
function closeSidebar(){
  sidebar.classList.remove("open");
  sidebarOverlay.classList.remove("show");
}

burgerBtn.addEventListener("click", () => {
  const isOpen = sidebar.classList.contains("open");
  if(isOpen){
    closeSidebar();
  } else {
    openSidebar();
  }
});

sidebarOverlay.addEventListener("click", closeSidebar);

window.addEventListener("resize", () => {
  if(window.innerWidth > 980){
    closeSidebar();
  }
});

applyFilters();
</script>

</body>
</html>
